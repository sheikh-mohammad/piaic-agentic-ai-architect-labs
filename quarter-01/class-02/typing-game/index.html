<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🐱 Word Catcher — Typing Game</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --bg-1: #1a1a2e;
            --bg-2: #16213e;
            --accent: #ff6b6b;
            --accent2: #feca57;
            --success: #2ecc71;
            --danger: #e74c3c;
            --text: #ffffff;
            --text-dim: #a0a0b0;
            --radius: 16px;
            --shadow: 0 8px 32px rgba(0,0,0,0.3);
            --panel-bg: rgba(255,255,255,0.05);
        }

        body {
            font-family: 'Fredoka', 'Segoe UI', system-ui, sans-serif;
            background: linear-gradient(135deg, var(--bg-1), var(--bg-2));
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--text);
            overflow: hidden;
            user-select: none;
        }

        .game-wrapper {
            width: 880px;
            max-width: 98vw;
            height: 95vh;
            max-height: 700px;
            display: flex;
            flex-direction: column;
            background: rgba(255,255,255,0.04);
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255,255,255,0.08);
            overflow: hidden;
            position: relative;
        }

        /* ─── HEADER ─── */
        .header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 12px 20px;
            background: rgba(0,0,0,0.25);
            border-bottom: 1px solid rgba(255,255,255,0.06);
            flex-shrink: 0;
            gap: 10px;
            flex-wrap: wrap;
        }
        .header-left { display: flex; align-items: center; gap: 12px; }
        .logo { font-size: 1.4rem; font-weight: 700; letter-spacing: 0.5px; display: flex; align-items: center; gap: 6px; }
        .logo span { background: linear-gradient(to right, var(--accent2), var(--accent)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }

        .stats { display: flex; gap: 16px; align-items: center; flex-wrap: wrap; }
        .stat { display: flex; align-items: center; gap: 5px; font-size: 0.95rem; font-weight: 500; padding: 4px 12px; border-radius: 20px; background: rgba(255,255,255,0.08); }
        .stat-icon { font-size: 1.1rem; }
        .hearts { font-size: 1.2rem; letter-spacing: 2px; }
        .hearts .lost { opacity: 0.2; }

        .progress-wrap { width: 100%; height: 4px; background: rgba(255,255,255,0.06); flex-shrink: 0; }
        .progress-bar { height: 100%; background: linear-gradient(to right, var(--accent2), var(--accent)); border-radius: 2px; transition: width 0.4s ease; width: 0%; }

        /* ─── GAME AREA ─── */
        .game-area {
            flex: 1;
            position: relative;
            overflow: hidden;
            background: radial-gradient(ellipse at 50% 100%, rgba(46,204,113,0.06) 0%, transparent 60%);
            min-height: 0;
        }

        /* falling word bubbles */
        .word-bubble {
            position: absolute;
            padding: 8px 18px;
            border-radius: 30px;
            color: #fff;
            font-weight: 600;
            font-size: 1.15rem;
            letter-spacing: 0.5px;
            box-shadow: 0 6px 20px rgba(0,0,0,0.3), inset 0 1px 0 rgba(255,255,255,0.2);
            transition: transform 0.08s ease, box-shadow 0.08s ease;
            white-space: nowrap;
            z-index: 10;
            pointer-events: none;
        }
        .word-bubble::after {
            content: '';
            position: absolute;
            inset: 0;
            border-radius: 30px;
            background: linear-gradient(180deg, rgba(255,255,255,0.2) 0%, transparent 50%);
            pointer-events: none;
        }
        .word-bubble.highlight {
            transform: scale(1.15);
            box-shadow: 0 0 30px rgba(255,255,255,0.35), 0 0 60px currentColor;
            z-index: 20;
        }
        .word-bubble.caught {
            animation: pop-word 0.35s ease forwards;
        }
        .word-bubble.missed {
            animation: shake-word 0.4s ease forwards;
        }

        @keyframes pop-word {
            0% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.6); opacity: 0.8; }
            100% { transform: scale(2); opacity: 0; }
        }
        @keyframes shake-word {
            0%, 100% { transform: translateX(0); opacity: 1; }
            20% { transform: translateX(-12px); }
            40% { transform: translateX(12px); }
            60% { transform: translateX(-8px); }
            80% { transform: translateX(8px); }
            100% { opacity: 0; }
        }

        /* ground line */
        .ground-line {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            height: 6px;
            background: linear-gradient(to right, transparent, rgba(255,107,107,0.15), var(--accent), rgba(255,107,107,0.15), transparent);
            z-index: 5;
        }
        .ground-line::before {
            content: '▔▔▔▔▔▔▔▔▔▔▔▔▔▔▔▔▔▔▔▔▔▔▔▔▔▔▔▔▔▔';
            position: absolute;
            bottom: 100%;
            left: 50%;
            transform: translateX(-50%);
            font-size: 0.6rem;
            letter-spacing: 4px;
            color: rgba(255,107,107,0.08);
            white-space: nowrap;
        }

        /* danger zone */
        .danger-zone {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            height: 30%;
            background: linear-gradient(0deg, rgba(231,76,60,0.06) 0%, transparent 100%);
            pointer-events: none;
            z-index: 1;
        }

        /* ─── BOTTOM INPUT ─── */
        .input-area {
            padding: 12px 20px;
            background: rgba(0,0,0,0.2);
            border-top: 1px solid rgba(255,255,255,0.06);
            flex-shrink: 0;
            display: flex;
            gap: 12px;
            align-items: center;
        }
        .input-area input {
            flex: 1;
            padding: 10px 18px;
            border-radius: 30px;
            border: 2px solid rgba(255,255,255,0.12);
            background: rgba(255,255,255,0.06);
            color: #fff;
            font-size: 1.2rem;
            font-family: inherit;
            font-weight: 500;
            outline: none;
            transition: border-color 0.2s, background 0.2s, box-shadow 0.2s;
        }
        .input-area input::placeholder { color: rgba(255,255,255,0.25); font-weight: 400; }
        .input-area input:focus { border-color: var(--accent2); background: rgba(255,255,255,0.08); }
        .input-area input.match { border-color: var(--success); box-shadow: 0 0 20px rgba(46,204,113,0.2); }
        .input-area input.nomatch { border-color: var(--danger); box-shadow: 0 0 20px rgba(231,76,60,0.15); }

        .score-pop {
            position: absolute;
            font-weight: 700;
            font-size: 1.4rem;
            color: var(--accent2);
            pointer-events: none;
            z-index: 50;
            animation: float-up 0.8s ease forwards;
        }
        @keyframes float-up {
            0% { transform: translateY(0) scale(1); opacity: 1; }
            100% { transform: translateY(-80px) scale(1.4); opacity: 0; }
        }

        /* ─── CAT MASCOT ─── */
        .cat-area {
            display: flex;
            align-items: center;
            gap: 8px;
            flex-shrink: 0;
        }
        .cat-mascot {
            font-size: 2.4rem;
            transition: transform 0.15s ease;
            cursor: default;
            flex-shrink: 0;
            line-height: 1;
        }
        .cat-mascot.bounce { animation: cat-bounce 0.4s ease; }
        .cat-mascot.sad { animation: cat-sad 0.5s ease; }

        @keyframes cat-bounce {
            0%, 100% { transform: scale(1) translateY(0); }
            30% { transform: scale(1.3) translateY(-12px); }
            60% { transform: scale(1.1) translateY(-4px); }
        }
        @keyframes cat-sad {
            0%, 100% { transform: scale(1) rotate(0); }
            25% { transform: scale(0.9) rotate(-8deg); }
            50% { transform: scale(0.95) rotate(5deg); }
            75% { transform: scale(0.9) rotate(-3deg); }
        }

        .cat-speech {
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(6px);
            padding: 5px 14px;
            border-radius: 20px;
            font-size: 0.85rem;
            font-weight: 500;
            color: var(--text-dim);
            border: 1px solid rgba(255,255,255,0.06);
            max-width: 180px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            transition: color 0.3s;
        }
        .cat-speech.excited { color: var(--accent2); }
        .cat-speech.sad { color: var(--accent); }

        /* ─── OVERLAY SCREENS ─── */
        .overlay {
            position: absolute;
            inset: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: rgba(10,10,25,0.88);
            backdrop-filter: blur(8px);
            z-index: 100;
            padding: 30px;
            transition: opacity 0.3s ease;
            opacity: 0;
            pointer-events: none;
        }
        .overlay.active { opacity: 1; pointer-events: all; }

        .overlay h1 { font-size: 2.6rem; font-weight: 700; margin-bottom: 6px; }
        .overlay h2 { font-size: 1.6rem; font-weight: 600; margin-bottom: 10px; color: var(--accent2); }
        .overlay p { font-size: 1rem; color: var(--text-dim); margin-bottom: 8px; max-width: 380px; text-align: center; line-height: 1.5; }
        .overlay .big-cat { font-size: 5rem; margin: 8px 0; }

        .btn {
            padding: 12px 40px;
            border-radius: 40px;
            border: none;
            font-family: inherit;
            font-size: 1.2rem;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.15s, box-shadow 0.2s;
            background: linear-gradient(135deg, var(--accent), #ee5a24);
            color: #fff;
            box-shadow: 0 4px 20px rgba(255,107,107,0.3);
            margin-top: 12px;
        }
        .btn:hover { transform: scale(1.04); box-shadow: 0 6px 30px rgba(255,107,107,0.4); }
        .btn:active { transform: scale(0.97); }
        .btn-secondary {
            background: rgba(255,255,255,0.1);
            box-shadow: none;
            font-size: 1rem;
            padding: 8px 24px;
        }
        .btn-secondary:hover { background: rgba(255,255,255,0.15); box-shadow: none; }

        .final-score { font-size: 3rem; font-weight: 700; background: linear-gradient(to right, var(--accent2), var(--accent)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin: 8px 0; }
        .stats-grid { display: flex; gap: 20px; margin: 10px 0; }
        .stats-grid .item { text-align: center; }
        .stats-grid .item .num { font-size: 1.8rem; font-weight: 700; }
        .stats-grid .item .label { font-size: 0.8rem; color: var(--text-dim); }

        /* ─── CONFETTI ─── */
        .confetti-piece {
            position: absolute;
            width: 10px;
            height: 10px;
            border-radius: 2px;
            top: -10px;
            z-index: 60;
            pointer-events: none;
            animation: confetti-fall linear forwards;
        }
        @keyframes confetti-fall {
            0% { transform: translateY(0) rotate(0deg); opacity: 1; }
            100% { transform: translateY(calc(100vh)) rotate(720deg); opacity: 0; }
        }

        /* ─── RESPONSIVE ─── */
        @media (max-width: 640px) {
            .game-wrapper { max-height: 100vh; height: 100vh; border-radius: 0; max-width: 100vw; }
            .header { padding: 8px 12px; }
            .logo { font-size: 1.1rem; }
            .stat { font-size: 0.8rem; padding: 2px 8px; }
            .hearts { font-size: 1rem; }
            .word-bubble { font-size: 1rem; padding: 6px 14px; }
            .input-area { padding: 8px 12px; }
            .input-area input { font-size: 1rem; padding: 8px 14px; }
            .overlay h1 { font-size: 2rem; }
            .overlay .big-cat { font-size: 3.5rem; }
            .cat-mascot { font-size: 1.8rem; }
            .cat-speech { max-width: 120px; font-size: 0.75rem; padding: 4px 10px; }
            .stats-grid .item .num { font-size: 1.4rem; }
            .final-score { font-size: 2.2rem; }
        }
        @media (max-width: 480px) {
            .header { flex-direction: column; align-items: stretch; gap: 4px; }
            .header-left { justify-content: center; }
            .stats { justify-content: center; }
            .cat-area { justify-content: center; }
        }
    </style>
</head>
<body>

<div class="game-wrapper" id="app">
    <!-- Header -->
    <header class="header">
        <div class="header-left">
            <div class="logo">🐱 <span>Word Catcher</span></div>
        </div>
        <div class="stats">
            <div class="stat"><span class="stat-icon">⭐</span><span id="scoreDisplay">0</span></div>
            <div class="stat"><span class="stat-icon">📊</span><span id="levelDisplay">Lv.1</span></div>
            <div class="stat"><span class="stat-icon">💖</span><span class="hearts" id="heartsDisplay">❤️❤️❤️</span></div>
            <div class="cat-area">
                <span class="cat-mascot" id="catMascot">😺</span>
                <span class="cat-speech" id="catSpeech">Let's play!</span>
            </div>
        </div>
    </header>
    <div class="progress-wrap"><div class="progress-bar" id="progressBar"></div></div>

    <!-- Game Area -->
    <div class="game-area" id="gameArea">
        <div class="ground-line"></div>
        <div class="danger-zone"></div>
        <!-- words are injected here -->

        <!-- Overlay: Start -->
        <div class="overlay active" id="overlayStart">
            <div class="big-cat">🐱</div>
            <h1>Word Catcher</h1>
            <p>Type the falling words before they hit the ground!<br>Each level gets faster. How many can you catch?</p>
            <button class="btn" id="btnStart">🎮 Play!</button>
        </div>

        <!-- Overlay: Level Up -->
        <div class="overlay" id="overlayLevelUp">
            <div class="big-cat">🥳</div>
            <h2 id="levelUpTitle">LEVEL UP!</h2>
            <p id="levelUpDesc">You're on fire! Speed is increasing!</p>
            <button class="btn" id="btnNextLevel">▶ Next Level</button>
        </div>

        <!-- Overlay: Game Over -->
        <div class="overlay" id="overlayGameOver">
            <div class="big-cat" id="gameOverCat">😿</div>
            <h1>Game Over</h1>
            <div class="final-score" id="finalScore">0</div>
            <div class="stats-grid">
                <div class="item"><div class="num" id="finalLevel">0</div><div class="label">Level Reached</div></div>
                <div class="item"><div class="num" id="finalWords">0</div><div class="label">Words Typed</div></div>
                <div class="item"><div class="num" id="finalHighLevel">0</div><div class="label">Best Level</div></div>
            </div>
            <button class="btn" id="btnRestart">🔄 Try Again</button>
        </div>
    </div>

    <!-- Input Area -->
    <div class="input-area">
        <input type="text" id="wordInput" placeholder="Type the word..." autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false">
        <div class="cat-area">
            <span class="cat-mascot" id="catMascot2" style="font-size:1.6rem;">🐱</span>
        </div>
    </div>
</div>

<script>
// ═══════════════════════════════════════════════════════════════
//  WORD LIST — age 12 appropriate
// ═══════════════════════════════════════════════════════════════
const WORD_LIST = [
    // short & sweet
    'cat','dog','sun','hat','box','pen','cup','ball','fish','bird',
    'book','star','moon','tree','rain','snow','rock','song','game','bear',
    'frog','lion','deer','wolf','crow','drum','flag','kite','lamp','bell',
    // medium
    'happy','music','house','green','apple','story','beach','ocean','river',
    'cloud','plant','stone','light','night','smile','dance','water','tiger',
    'panda','honey','magic','dream','brave','smart','quick','jolly','lucky',
    'sunny','candy','party','pizza','piano','robot','tulip','coral','ember',
    // longer
    'bicycle','rainbow','elephant','mountain','library','picture','garden',
    'planet','winter','summer','spring','friend','school','animal','forest',
    'bridge','castle','pencil','rocket','guitar','cookie','monkey','puzzle',
    'kitten','purple','yellow','orange','silver','marble','candle','donkey',
    'turtle','rabbit','falcon','flame','storm','crystal','wonder','clever',
    // challenge
    'adventure','chocolate','dinosaur','vacation','birthday','sunshine',
    'thunder','whisper','kingdom','mystery','journey','courage','freedom',
    'miracle','treasure','balloon','pumpkin','blanket','monster','dragon',
    'volcano','tornado','pancake','popcorn','harvest','lantern','village',
    'captain','champion','giraffe','dolphin','penguin','goblin','knight',
    'shadow','sparkle','twinkle','blossom','breeze','canyon','desert',
    'island','lizard','planet','silver','winter','zephyr','sapphire',
    // boss words
    'butterfly','strawberry','watermelon','helicopter','motorcycle',
    'dictionary','adventure','astronaut','saxophone','laboratory',
    'umbrella','kaleidoscope','trampoline','binoculars',
];

const WORD_COLORS = [
    '#e74c3c','#e67e22','#f1c40f','#2ecc71','#3498db',
    '#9b59b6','#1abc9c','#e84393','#00b894','#6c5ce7',
    '#fd79a8','#00cec9','#a29bfe','#55efc4','#ff7675',
];

const CAT_FACES = {
    idle:   '😺',
    happy:  '😸',
    cheer:  '🎉😺',
    sad:    '😿',
    cry:    '😢',
    levelUp:'🥳',
    gameOver:'😿',
    typing: '😊',
};

const CAT_LINES = {
    idle: [
        'Type the words!', 'Go go go!', 'You got this!',
        'Keep typing!', 'Let\'s go!', 'Stay fast!',
    ],
    typing: [ 'Almost there!', 'Keep going!', 'So close!', 'You can do it!' ],
    correct: [
        'Nice! 🎉', 'Woohoo!', 'Amazing!', 'Great!', 'Awesome!',
        'Super!', 'WOW!', 'Cool!', 'Yay!', 'Brilliant!',
    ],
    miss: [ 'Oh no! 😿', 'Almost!', 'Faster!', 'Oops!', 'Don\'t give up!' ],
    levelUp: [ 'LEVEL UP!! 🥳', 'YOU ROCK! 🎸', 'INCREDIBLE! 🌟', 'SUPERSTAR! ⭐' ],
    gameOver: [ 'Try again! 💪', 'Practice makes perfect!', 'One more try?', 'You\'ll get it!' ],
};

// ═══════════════════════════════════════════════════════════════
//  LEVEL CONFIG
// ═══════════════════════════════════════════════════════════════
function getLevelConfig(level) {
    const l = Math.min(level, 20);
    return {
        wordsToClear: Math.min(8 + l * 2, 28),
        fallSpeed: Math.max(14 - l * 0.9, 4.2),           // seconds to fall
        spawnInterval: Math.max(3200 - l * 180, 1100),     // ms between spawns
        maxConcurrent: Math.min(4 + Math.floor(l / 2), 12),
        pointsPerWord: l * 10,
        bonusSpeed: Math.max(l * 2, 2),                   // bonus if typed fast
    };
}

// ═══════════════════════════════════════════════════════════════
//  GAME STATE
// ═══════════════════════════════════════════════════════════════
const game = {
    running: false,
    level: 1,
    score: 0,
    lives: 3,
    words: [],           // active falling words
    clearedThisLevel: 0,
    totalWordsTyped: 0,
    highestLevel: 1,
    maxLives: 3,
    lastSpawnTime: 0,
    catTimeout: null,
    wordTimeout: null,
    animFrame: null,
    usedWords: new Set(),  // words currently on screen
};

// DOM refs
const $ = id => document.getElementById(id);
const gameArea = $('gameArea');
const wordInput = $('wordInput');
const scoreDisplay = $('scoreDisplay');
const levelDisplay = $('levelDisplay');
const heartsDisplay = $('heartsDisplay');
const progressBar = $('progressBar');
const catMascot = $('catMascot');
const catMascot2 = $('catMascot2');
const catSpeech = $('catSpeech');
const overlayStart = $('overlayStart');
const overlayLevelUp = $('overlayLevelUp');
const overlayGameOver = $('overlayGameOver');
const levelUpTitle = $('levelUpTitle');
const levelUpDesc = $('levelUpDesc');
const finalScore = $('finalScore');
const finalLevel = $('finalLevel');
const finalWords = $('finalWords');
const finalHighLevel = $('finalHighLevel');
const gameOverCat = $('gameOverCat');

// ═══════════════════════════════════════════════════════════════
//  SOUND — simple Web Audio beeps (no files needed)
// ═══════════════════════════════════════════════════════════════
let audioCtx = null;
function getAudio() {
    if (!audioCtx) {
        try { audioCtx = new (window.AudioContext || window.webkitAudioContext)(); } catch { return null; }
    }
    if (audioCtx.state === 'suspended') audioCtx.resume();
    return audioCtx;
}

function playBeep(freq, duration, type = 'sine', vol = 0.15) {
    const ctx = getAudio();
    if (!ctx) return;
    try {
        const osc = ctx.createOscillator();
        const gain = ctx.createGain();
        osc.type = type;
        osc.frequency.setValueAtTime(freq, ctx.currentTime);
        gain.gain.setValueAtTime(vol, ctx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + duration);
        osc.connect(gain);
        gain.connect(ctx.destination);
        osc.start(ctx.currentTime);
        osc.stop(ctx.currentTime + duration);
    } catch { /* silently fail */ }
}

function playCatchSound() {
    playBeep(660, 0.08, 'sine', 0.12);
    setTimeout(() => playBeep(880, 0.08, 'sine', 0.10), 50);
}

function playMissSound() {
    playBeep(260, 0.25, 'sawtooth', 0.08);
}

function playLevelUpSound() {
    const notes = [523, 659, 784, 1047];
    notes.forEach((f, i) => setTimeout(() => playBeep(f, 0.15, 'sine', 0.10), i * 90));
}

function playGameOverSound() {
    const notes = [500, 450, 400, 350];
    notes.forEach((f, i) => setTimeout(() => playBeep(f, 0.2, 'sine', 0.08), i * 120));
}

// ═══════════════════════════════════════════════════════════════
//  CAT MASCOT
// ═══════════════════════════════════════════════════════════════
function setCat(face, message, mood = '') {
    const faceEmoji = CAT_FACES[face] || CAT_FACES.idle;
    catMascot.textContent = faceEmoji;
    catMascot2.textContent = faceEmoji.replace(/[^🐱😺😸🎉😿😢🥳😊]/g, '') || '🐱';
    catSpeech.textContent = message || '...';

    catMascot.className = 'cat-mascot' + (mood ? ' ' + mood : '');
    catMascot2.className = 'cat-mascot' + (mood ? ' ' + mood : '');
    catSpeech.className = 'cat-speech' + (mood === 'bounce' ? ' excited' : mood === 'sad' ? ' sad' : '');

    if (game.catTimeout) clearTimeout(game.catTimeout);
    game.catTimeout = setTimeout(() => {
        if (game.running) {
            setCat('idle', CAT_LINES.idle[Math.floor(Math.random() * CAT_LINES.idle.length)]);
        }
    }, 1800);
}

function showCatCorrect() {
    const msg = CAT_LINES.correct[Math.floor(Math.random() * CAT_LINES.correct.length)];
    setCat('cheer', msg, 'bounce');
}

function showCatMiss() {
    const msg = CAT_LINES.miss[Math.floor(Math.random() * CAT_LINES.miss.length)];
    setCat('sad', msg, 'sad');
}

function showCatLevelUp() {
    const msg = CAT_LINES.levelUp[Math.floor(Math.random() * CAT_LINES.levelUp.length)];
    setCat('levelUp', msg, 'bounce');
}

// ═══════════════════════════════════════════════════════════════
//  SCORE POPUP
// ═══════════════════════════════════════════════════════════════
function showScorePopup(x, y, text, color = '#feca57') {
    const el = document.createElement('div');
    el.className = 'score-pop';
    el.textContent = text;
    el.style.left = x + 'px';
    el.style.top = y + 'px';
    el.style.color = color;
    gameArea.appendChild(el);
    setTimeout(() => el.remove(), 900);
}

// ═══════════════════════════════════════════════════════════════
//  CONFETTI
// ═══════════════════════════════════════════════════════════════
function createConfetti(count = 40) {
    const colors = ['#ff6b6b','#feca57','#2ecc71','#3498db','#9b59b6','#e84393','#1abc9c','#fd79a8'];
    for (let i = 0; i < count; i++) {
        const el = document.createElement('div');
        el.className = 'confetti-piece';
        const color = colors[Math.floor(Math.random() * colors.length)];
        el.style.background = color;
        el.style.left = Math.random() * 100 + '%';
        el.style.width = (4 + Math.random() * 8) + 'px';
        el.style.height = (4 + Math.random() * 8) + 'px';
        el.style.borderRadius = Math.random() > 0.5 ? '50%' : '2px';
        el.style.animationDuration = (1.5 + Math.random() * 2) + 's';
        el.style.animationDelay = (Math.random() * 0.8) + 's';
        el.style.transform = `rotate(${Math.random() * 360}deg)`;
        gameArea.appendChild(el);
        setTimeout(() => el.remove(), 4000);
    }
}

// ═══════════════════════════════════════════════════════════════
//  WORD SPAWNING
// ═══════════════════════════════════════════════════════════════
function getRandomWord() {
    const available = WORD_LIST.filter(w => !game.usedWords.has(w));
    if (available.length === 0) {
        game.usedWords.clear();
        return WORD_LIST[Math.floor(Math.random() * WORD_LIST.length)];
    }
    return available[Math.floor(Math.random() * available.length)];
}

function getRandomColor() {
    return WORD_COLORS[Math.floor(Math.random() * WORD_COLORS.length)];
}

function spawnWord() {
    const cfg = getLevelConfig(game.level);
    if (game.words.length >= cfg.maxConcurrent) return;

    const word = getRandomWord();
    const area = gameArea.getBoundingClientRect();
    const areaW = gameArea.clientWidth || area.width;
    const padding = 70;
    const wordWidth = word.length * 12 + 36; // rough estimate
    const maxX = Math.max(areaW - wordWidth - padding, padding);
    const x = padding + Math.random() * Math.max(maxX - padding, 10);

    const color = getRandomColor();

    const el = document.createElement('div');
    el.className = 'word-bubble';
    el.textContent = word;
    el.style.left = x + 'px';
    el.style.top = '-50px';
    el.style.background = color;
    el.dataset.word = word;

    gameArea.appendChild(el);

    const wordObj = {
        word,
        element: el,
        x,
        y: -50,
        speed: 0, // computed per frame
        color,
        alive: true,
        highlighted: false,
        spawnTime: performance.now(),
        fallDuration: cfg.fallSpeed * 1000,
    };

    game.words.push(wordObj);
    game.usedWords.add(word);
}

// ═══════════════════════════════════════════════════════════════
//  GAME LOOP
// ═══════════════════════════════════════════════════════════════
let lastFrame = 0;

function gameLoop(timestamp) {
    if (!game.running) return;

    const dt = lastFrame ? timestamp - lastFrame : 16;
    lastFrame = timestamp;

    const areaHeight = gameArea.clientHeight;
    const bottomY = areaHeight - 60;

    // move words
    for (const w of game.words) {
        if (!w.alive) continue;
        const elapsed = timestamp - w.spawnTime;
        const progress = elapsed / w.fallDuration;
        w.y = -50 + progress * (bottomY + 60);
        w.element.style.top = w.y + 'px';

        // danger zone flash
        if (w.y > bottomY * 0.7 && !w._dangerWarned) {
            w._dangerWarned = true;
            w.element.style.transition = 'box-shadow 0.3s';
            w.element.style.boxShadow = `0 0 16px rgba(231,76,60,0.4)`;
        }

        // hit bottom?
        if (w.y >= bottomY) {
            missWord(w);
        }
    }

    // remove dead words (keep array clean for next check)
    const dead = game.words.filter(w => !w.alive);
    dead.forEach(w => {
        game.usedWords.delete(w.word);
        setTimeout(() => w.element.remove(), 600);
    });
    game.words = game.words.filter(w => w.alive);

    // spawn new words
    const cfg = getLevelConfig(game.level);
    if (timestamp - game.lastSpawnTime > cfg.spawnInterval) {
        spawnWord();
        game.lastSpawnTime = timestamp;
    }

    // update UI
    renderUI();

    game.animFrame = requestAnimationFrame(gameLoop);
}

// ─── MISS ───
function missWord(w) {
    if (!w.alive) return;
    w.alive = false;
    w.element.className = 'word-bubble missed';
    game.lives--;
    playMissSound();
    showCatMiss();
    updateHearts();

    if (game.lives <= 0) {
        endGame();
    }
    renderUI();
}

// ─── CATCH ───
function catchWord(w) {
    if (!w.alive) return;
    w.alive = false;

    const cfg = getLevelConfig(game.level);
    const elapsed = performance.now() - w.spawnTime;
    const halfTime = w.fallDuration / 2;
    const bonus = elapsed < halfTime ? cfg.bonusSpeed : 0;
    const points = cfg.pointsPerWord + bonus;

    game.score += points;
    game.clearedThisLevel++;
    game.totalWordsTyped++;

    w.element.className = 'word-bubble caught';

    // score popup
    const rect = w.element.getBoundingClientRect();
    const areaRect = gameArea.getBoundingClientRect();
    let popText = `+${points}`;
    if (bonus) popText += ` ✨`;
    showScorePopup(rect.left - areaRect.left, rect.top - areaRect.top - 10, popText, bonus ? '#feca57' : '#2ecc71');

    playCatchSound();
    showCatCorrect();
    wordInput.value = '';
    wordInput.className = '';
    wordInput.focus();

    // level up check
    if (game.clearedThisLevel >= cfg.wordsToClear) {
        // slight delay for the catch animation
        setTimeout(() => levelUp(), 350);
    }

    renderUI();
}

// ═══════════════════════════════════════════════════════════════
//  LEVELS
// ═══════════════════════════════════════════════════════════════
function levelUp() {
    game.running = false;
    if (game.animFrame) cancelAnimationFrame(game.animFrame);
    game.level++;
    if (game.level > game.highestLevel) game.highestLevel = game.level;

    playLevelUpSound();
    showCatLevelUp();
    createConfetti(50);

    levelUpTitle.textContent = `🌟 Level ${game.level - 1} → ${game.level}! 🌟`;
    const cfg = getLevelConfig(game.level);
    const prevCfg = getLevelConfig(game.level - 1);
    levelUpDesc.textContent = `Speed: ${prevCfg.fallSpeed.toFixed(1)}s → ${cfg.fallSpeed.toFixed(1)}s · ${cfg.wordsToClear} words to clear!`;

    overlayLevelUp.classList.add('active');
}

function startLevel() {
    overlayLevelUp.classList.remove('active');
    game.clearedThisLevel = 0;
    game.lastSpawnTime = performance.now();
    lastFrame = 0;
    game.running = true;
    setCat('idle', CAT_LINES.idle[Math.floor(Math.random() * CAT_LINES.idle.length)]);
    wordInput.value = '';
    wordInput.focus();
    game.animFrame = requestAnimationFrame(gameLoop);
    renderUI();
}

// ═══════════════════════════════════════════════════════════════
//  GAME OVER
// ═══════════════════════════════════════════════════════════════
function endGame() {
    game.running = false;
    if (game.animFrame) cancelAnimationFrame(game.animFrame);
    playGameOverSound();

    gameOverCat.textContent = '😿';
    finalScore.textContent = game.score;
    finalLevel.textContent = game.level;
    finalWords.textContent = game.totalWordsTyped;
    finalHighLevel.textContent = game.highestLevel;

    setCat('gameOver', CAT_LINES.gameOver[Math.floor(Math.random() * CAT_LINES.gameOver.length)], 'sad');
    overlayGameOver.classList.add('active');
}

// ═══════════════════════════════════════════════════════════════
//  INPUT HANDLING
// ═══════════════════════════════════════════════════════════════
wordInput.addEventListener('input', () => {
    if (!game.running) return;
    const typed = wordInput.value.trim().toLowerCase();
    if (!typed) {
        // clear highlights
        game.words.forEach(w => {
            w.highlighted = false;
            w.element.classList.remove('highlight');
        });
        wordInput.className = '';
        return;
    }

    let matchFound = false;
    let exactMatch = null;

    for (const w of game.words) {
        if (!w.alive) continue;
        const wl = w.word.toLowerCase();
        if (wl === typed) {
            exactMatch = w;
            break;
        }
        if (wl.startsWith(typed)) {
            w.highlighted = true;
            w.element.classList.add('highlight');
            matchFound = true;
        } else {
            w.highlighted = false;
            w.element.classList.remove('highlight');
        }
    }

    if (exactMatch) {
        catchWord(exactMatch);
        return;
    }

    // If we have a partial match, show green-ish input
    if (matchFound) {
        wordInput.className = 'match';
        const partialMatch = game.words.find(w => w.alive && w.highlighted);
        if (partialMatch && catMascot.textContent === CAT_FACES.idle) {
            // subtle typing encouragement
        }
    } else {
        wordInput.className = 'nomatch';
    }
});

// Keyboard shortcut: Enter to restart from game over
wordInput.addEventListener('keydown', (e) => {
    if (e.key === 'Enter' && !game.running) {
        if (overlayGameOver.classList.contains('active')) {
            resetGame();
        } else if (overlayStart.classList.contains('active')) {
            startGame();
        } else if (overlayLevelUp.classList.contains('active')) {
            startLevel();
        }
    }
});

// ═══════════════════════════════════════════════════════════════
//  UI UPDATES
// ═══════════════════════════════════════════════════════════════
function renderUI() {
    scoreDisplay.textContent = game.score;
    levelDisplay.textContent = `Lv.${game.level}`;
    updateHearts();

    const cfg = getLevelConfig(game.level);
    const pct = Math.min((game.clearedThisLevel / cfg.wordsToClear) * 100, 100);
    progressBar.style.width = pct + '%';
}

function updateHearts() {
    let h = '';
    for (let i = 0; i < game.maxLives; i++) {
        h += i < game.lives ? '❤️' : '<span class="lost">❤️</span>';
    }
    heartsDisplay.innerHTML = h;
}

// ═══════════════════════════════════════════════════════════════
//  GAME FLOW
// ═══════════════════════════════════════════════════════════════
function startGame() {
    overlayStart.classList.remove('active');
    overlayGameOver.classList.remove('active');
    overlayLevelUp.classList.remove('active');
    game.running = false;
    if (game.animFrame) cancelAnimationFrame(game.animFrame);

    // clear lingering words
    game.words.forEach(w => w.element.remove());
    game.words = [];
    game.usedWords.clear();

    game.score = 0;
    game.level = 1;
    game.lives = game.maxLives;
    game.clearedThisLevel = 0;
    game.totalWordsTyped = 0;
    game.highestLevel = 1;

    // clear confetti/score pops
    document.querySelectorAll('.confetti-piece, .score-pop').forEach(el => el.remove());

    setCat('idle', 'Type the words! 🎮');
    wordInput.value = '';
    wordInput.focus();

    game.lastSpawnTime = performance.now();
    lastFrame = 0;
    game.running = true;
    game.animFrame = requestAnimationFrame(gameLoop);
    renderUI();
}

function resetGame() {
    overlayGameOver.classList.remove('active');
    overlayLevelUp.classList.remove('active');
    startGame();
}

// ═══════════════════════════════════════════════════════════════
//  EVENT BINDINGS
// ═══════════════════════════════════════════════════════════════
$('btnStart').addEventListener('click', startGame);
$('btnNextLevel').addEventListener('click', startLevel);
$('btnRestart').addEventListener('click', resetGame);

// click game area to focus input
gameArea.addEventListener('click', () => {
    if (game.running) wordInput.focus();
});

// ═══════════════════════════════════════════════════════════════
//  INIT
// ═══════════════════════════════════════════════════════════════
setCat('idle', 'Press Play to start!');
renderUI();
wordInput.disabled = false;
console.log('🐱 Word Catcher loaded! Have fun typing!');
</script>
